name: AI-Powered CV Update with GitHub Releases

on:
  push:
    branches: [ '*' ]
    paths:
      - '.github/workflows/update-cv-with-ai.yml'
      - '_data/**'
      - 'curriculum_vitae/**'
  pull_request:
    branches: [ '*' ]
    paths:
      - '.github/workflows/update-cv-with-ai.yml'
      - '_data/**'
      - 'curriculum_vitae/**'
  workflow_dispatch:
    inputs:
      rebuild_mode:
        description: 'CV Generation Mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full_rebuild

permissions:
  contents: write

env:
  CAREER_FILE: ${{ github.workspace }}/_data/career.md
  CV_FILE: ${{ github.workspace }}/curriculum_vitae/markus-schulte-dev-anti-cv.tex
  RESPONSE_FILE: claude_response.json

jobs:
  update-cv-with-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: curriculum_vitae/scripts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: 'curriculum_vitae/scripts/package-lock.json'
          node-version-file: 'curriculum_vitae/scripts/.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Test CV update with dry run
        env:
          DRY_RUN: true
          SKIP_API: true
        run: npm test

      - name: Transform with Claude
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REBUILD_MODE: ${{ github.event.inputs.rebuild_mode }}
        run: npm run cv:update

      - name: Set generation timestamp
        id: timestamp
        run: echo "generated_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Compile LaTeX to PDF
        if: success() && steps.transform.outputs.mode != 'skip'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ env.CV_FILE }}
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Commit updated LaTeX file
        if: success() && steps.transform.outputs.mode != 'skip' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update CV: ${{ steps.transform.outputs.mode == 'full_rebuild' && 'Full Rebuild' || 'Incremental Update' }}"
          file_pattern: "${{ env.CV_FILE }}"
          commit_options: "--signoff"

      - name: Delete existing release and tag
        if: success() && steps.transform.outputs.mode != 'skip' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: .
        run: |
          gh release delete cv-latest --yes || true
          git push --delete origin cv-latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF to GitHub Releases
        if: success() && steps.transform.outputs.mode != 'skip' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-latest
          name: "Latest CV - Markus Schulte"
          body: |
            🤖 Auto-generated CV

            **AI Model:** Claude 4 Opus with Extended Thinking
            **Generation Mode:** ${{ steps.transform.outputs.mode == 'full_rebuild' && 'Full Rebuild 🔄' || 'Incremental Update 📝' }}
            **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Auto (career.md change)' }}
            **Generated on:** ${{ steps.timestamp.outputs.generated_date }}
            **Commit:** ${{ github.sha }}

            📄 Direct download: [markus-schulte-dev-anti-cv.pdf](https://github.com/${{ github.repository }}/releases/latest/download/markus-schulte-dev-anti-cv.pdf)
          files: markus-schulte-dev-anti-cv.pdf
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output download link
        if: success() && steps.transform.outputs.mode != 'skip'
        working-directory: .
        run: |
          echo "✅ CV updated successfully with Claude 4 Opus!"
          echo "🎯 Mode: ${{ steps.transform.outputs.mode }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" != "pull_request" ]]; then
            echo "📄 Download link: https://github.com/${{ github.repository }}/releases/latest/download/markus-schulte-dev-anti-cv.pdf"
          else
            echo "📝 Branch/PR build - PDF not uploaded to releases"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cv-build-logs-${{ github.run_id }}-${{ github.sha }}
          path: |
            *.log
            ${{ env.CV_FILE }}
            markus-schulte-dev-anti-cv.pdf
            claude_response.json
          retention-days: 7
