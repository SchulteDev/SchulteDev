name: AI-Powered CV Update with GitHub Releases

on:
  push:
    branches: [ '*' ]
    paths:
      - '.github/workflows/update-cv-with-ai.yml'
      - '_data/**'
      - 'curriculum_vitae/**'
  pull_request:
    branches: [ '*' ]
    paths:
      - '.github/workflows/update-cv-with-ai.yml'
      - '_data/**'
      - 'curriculum_vitae/**'
  workflow_dispatch:
    inputs:
      rebuild_mode:
        description: 'CV Generation Mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full_rebuild

permissions:
  contents: write

env:
  CAREER_FILE: ${{ github.workspace }}/_data/career.md
  ANTI_CV_FILE: ${{ github.workspace }}/curriculum_vitae/markus-schulte-dev-anti-cv.tex
  PROFESSIONAL_CV_FILE: ${{ github.workspace }}/curriculum_vitae/markus-schulte-dev-professional-cv.tex

jobs:
  update-cvs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cv_type: [anti, professional]
    outputs:
      mode: ${{ steps.transform.outputs.mode }}
    defaults:
      run:
        working-directory: curriculum_vitae/scripts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: 'curriculum_vitae/scripts/package-lock.json'
          node-version-file: 'curriculum_vitae/scripts/.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Test CV update with dry run
        env:
          DRY_RUN: true
          SKIP_API: true
        run: npm test

      - name: Transform CV with Claude
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REBUILD_MODE: ${{ github.event.inputs.rebuild_mode }}
        run: npm run cv:update:${{ matrix.cv_type }}

      - name: Compile CV LaTeX to PDF
        if: success() && steps.transform.outputs.mode != 'skip'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ github.workspace }}/curriculum_vitae/markus-schulte-dev-${{ matrix.cv_type }}-cv.tex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload CV PDF
        if: success() && steps.transform.outputs.mode != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cv_type }}-cv-pdf
          path: markus-schulte-dev-${{ matrix.cv_type }}-cv.pdf

      - name: Commit updated LaTeX files
        if: success() && steps.transform.outputs.mode != 'skip' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && matrix.cv_type == 'anti'
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update CVs: ${{ github.event.inputs.rebuild_mode == 'full_rebuild' && 'Full Rebuild' || 'Incremental Update' }} (Anti-CV + Professional CV)"
          file_pattern: "curriculum_vitae/markus-schulte-dev-*.tex"

  release:
    needs: update-cvs
    if: needs.update-cvs.result == 'success' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Anti-CV PDF
        uses: actions/download-artifact@v4
        with:
          name: anti-cv-pdf

      - name: Download Professional CV PDF
        uses: actions/download-artifact@v4
        with:
          name: professional-cv-pdf

      - name: Set generation timestamp
        id: timestamp
        run: echo "generated_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Delete existing release and tag
        if: success() && steps.transform.outputs.mode != 'skip' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          gh release delete cv-latest --yes || true
          git push --delete origin cv-latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDFs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-latest
          name: "Latest CVs - Markus Schulte"
          body: |
            🤖 Auto-generated CVs (Dual Format)

            **AI Model:** Claude 4 Opus with Extended Thinking
            **Generation Mode:** Full Rebuild 🔄 or Incremental Update 📝
            **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Auto (career.md change)' }}
            **Generated on:** ${{ steps.timestamp.outputs.generated_date }}
            **Commit:** ${{ github.sha }}

            📄 **Download Links:**
            - [Professional CV](https://github.com/${{ github.repository }}/releases/latest/download/markus-schulte-dev-professional-cv.pdf) - Traditional format highlighting achievements
            - [Anti-CV (Humorous)](https://github.com/${{ github.repository }}/releases/latest/download/markus-schulte-dev-anti-cv.pdf) - Showcasing failures and lessons learned
          files: |
            markus-schulte-dev-anti-cv.pdf
            markus-schulte-dev-professional-cv.pdf
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cv-build-logs-${{ github.run_id }}-${{ github.sha }}
          path: |
            *.log
            curriculum_vitae/markus-schulte-dev-*.tex
            markus-schulte-dev-*.pdf
            curriculum_vitae/scripts/tmp/
          retention-days: 7
