name: AI-Powered CV Update with GitHub Releases

on:
  push:
    branches: [ main ]
    paths: [ 'career.md' ]
  workflow_dispatch:
    inputs:
      rebuild_mode:
        description: 'CV Generation Mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full_rebuild

permissions:
  contents: write

jobs:
  update-cv-with-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes and determine mode
        id: mode
        env:
          REBUILD_MODE: ${{ github.event.inputs.rebuild_mode }}
        run: ./scripts/detect-changes.sh

      - name: Transform with Claude 4 Opus (Incremental)
        if: steps.mode.outputs.process_mode == 'incremental'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./scripts/transform-incremental.sh

      - name: Transform with Claude 4 Opus (Full Rebuild)
        if: steps.mode.outputs.process_mode == 'full_rebuild'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./scripts/transform-full-rebuild.sh

      - name: Validate and apply changes
        if: steps.mode.outputs.process_mode != 'skip'
        run: ./scripts/validate-response.sh ${{ steps.mode.outputs.process_mode }}

      - name: Compile LaTeX to PDF
        if: steps.mode.outputs.process_mode != 'skip'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: anti-cv.tex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload PDF to GitHub Releases
        if: steps.mode.outputs.process_mode != 'skip'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cv-latest
          name: "Latest CV - Markus Schulte"
          body: |
            🤖 Auto-generated CV (Claude 4 Opus Enhanced)

            **AI Model:** Claude 4 Opus with Extended Thinking
            **Generation Mode:** ${{ steps.mode.outputs.process_mode == 'full_rebuild' && 'Full Rebuild 🔄' || 'Incremental Update 📝' }}
            **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Auto (career.md change)' }}
            **Generated on:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}

            📄 Direct download: [markus-schulte-cv.pdf](https://github.com/${{ github.repository }}/releases/latest/download/anti-cv.pdf)
          files: anti-cv.pdf
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output download link
        if: steps.mode.outputs.process_mode != 'skip'
        run: |
          echo "✅ CV updated successfully with Claude 4 Opus!"
          echo "🎯 Mode: ${{ steps.mode.outputs.process_mode }}"
          echo "📄 Download link: https://github.com/${{ github.repository }}/releases/latest/download/anti-cv.pdf"
