name: AI-Powered CV Update with GitHub Releases

on:
  push:
    branches: [ main ]
    paths: [ '_data/career.md' ]
  workflow_dispatch:
    inputs:
      rebuild_mode:
        description: 'CV Generation Mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full_rebuild

permissions:
  contents: write

env:
  CAREER_FILE: _data/career.md
  CV_FILE: cv/anti-cv.tex
  RESPONSE_FILE: claude_response.json

jobs:
  update-cv-with-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Transform with Claude
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REBUILD_MODE: ${{ github.event.inputs.rebuild_mode }}
        run: ./scripts/run-cv-update.sh

      - name: Compile LaTeX to PDF
        if: success() && steps.transform.outputs.mode != 'skip'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ env.CV_FILE }}
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Commit updated LaTeX file
        if: success() && steps.transform.outputs.mode != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.CV_FILE }}"
          git diff --staged --quiet || git commit -m "Update CV: ${{ steps.transform.outputs.mode == 'full_rebuild' && 'Full Rebuild' || 'Incremental Update' }}"
          git push

      - name: Upload PDF to GitHub Releases
        if: success() && steps.transform.outputs.mode != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-latest
          name: "Latest CV - Markus Schulte"
          body: |
            🤖 Auto-generated CV (Claude 4 Opus Enhanced)

            **AI Model:** Claude 4 Opus with Extended Thinking
            **Generation Mode:** ${{ steps.transform.outputs.mode == 'full_rebuild' && 'Full Rebuild 🔄' || 'Incremental Update 📝' }}
            **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Auto (career.md change)' }}
            **Generated on:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}

            📄 Direct download: [markus-schulte-cv.pdf](https://github.com/${{ github.repository }}/releases/latest/download/anti-cv.pdf)
          files: anti-cv.pdf
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output download link
        if: success() && steps.transform.outputs.mode != 'skip'
        run: |
          echo "✅ CV updated successfully with Claude 4 Opus!"
          echo "🎯 Mode: ${{ steps.transform.outputs.mode }}"
          echo "📄 Download link: https://github.com/${{ github.repository }}/releases/latest/download/anti-cv.pdf"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cv-build-logs
          path: |
            *.log
            claude_response.json
          retention-days: 7
